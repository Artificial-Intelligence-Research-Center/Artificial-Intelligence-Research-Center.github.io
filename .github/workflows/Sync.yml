name: Pull from Source Repo

on:
  workflow_dispatch: # 手動觸發

jobs:
  pull-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_ACTION_TOKEN }}
          fetch-depth: 0

      - name: Pull and Merge from Source
        run: |
          git config --global user.name "csps90536-prog"
          git config --global user.email "csps90536@gmail.com"
          
          # 1. 加入來源 Repo 作為遠端分支 (不需要 Token，如果是公開的話)
          git remote add source_repo https://github.com/csps90536-prog/M4_Website.git
          
          # 2. 抓取來源的資料
          git fetch source_repo
          
          # 3. 將來源的 main 分支合併進來 (或是直接覆蓋)
          git merge source_repo/main --allow-unrelated-histories
          
          # 4. 推送回自己的 Repo
          git push origin main
